<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamGo - Seu Servidor Particular</title>
    <style>
        :root {
            --primary-color: #e50914;
            --bg-color: #141414;
            --card-bg: #1f1f1f;
            --text-color: #ffffff;
            --text-muted: #b3b3b3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            line-height: 1.6;
            padding-bottom: 50px;
        }

        header {
            padding: 20px 5%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: var(--primary-color);
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            padding: 0 5%;
            margin-top: 20px;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .movie-card:hover {
            transform: scale(1.03);
        }

        .video-container {
            width: 100%;
            background: #000;
            aspect-ratio: 16 / 9;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        .movie-info {
            padding: 15px;
        }

        .movie-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-meta {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-muted);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #222;
        }
        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">StreamGo</div>
    </header>

    <div class="container">
        <h2>Minha Biblioteca</h2>
        
        <div class="movie-grid">
            {{if .}}
                {{range .}}
                <div class="movie-card">
                    <div class="video-container">
                        <video controls preload="metadata">
                            <source src="/videos/{{.Path}}" type="video/mp4">
                            Seu navegador não suporta a reprodução de vídeo.
                        </video>
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">{{.Title}}</div>
                        <div class="movie-meta">Arquivo: {{.Path}}</div>
                    </div>
                </div>
                {{end}}
            {{else}}
                <div class="empty-state">
                    <p>Nenhum filme encontrado. Adicione arquivos .mp4 na pasta do servidor!</p>
                </div>
            {{end}}
        </div>
    </div>
</body>
</html>
